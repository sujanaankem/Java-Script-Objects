<!DOCTYPE html>
<html>

<head>
    <title>Objects in Array fruits</title>
    <script src="ObjectsInArrayFruits.js"></script>
    <link rel="stylesheet" href="ObjectsInArrayFruits.css">
</head>

<body>
    
    <h2>Objects in Array fruits</h2>
    <p>Enter the types of fruits and their quantity in the shop.</p>
    <div id="divFruits">
    <label for="lblId">Id</label>
    <input id="txtId" type="number" placeholder="Enter the id">
    <label for="lblFruitName">Fruit Name</label>
    <input id="txtFruitName" type="text" placeholder="Enter the fruit name">
    <label for="lblCategory">Category</label>
    <input id="txtCategory" type="text" placeholder="Local/Domestic/Inter national products">
    <label for="lblPrice">Price per kg</label>
    <input id="txtPrice" type="number">
    <label for="lblCountry">Country</label>
    <input id="txtCountry" type="text">
    <label for="lblState">State</label>
    <input id="txtState" type="text">
    <label for="lblQuantity">Quantity in kgs</label>
    <input id="txtQuantity" type="text">
    <button id="btnSubmit" onclick="onClickSubmit()">Submit</button>
    </div>
    <p id="pResult"></p>
</body>

</html>
